// ── Helpers ──────────────────────────────────────────────────
function fmt12(t){
  if(!t)return'';
  const[h,m]=t.split(':').map(Number);
  return`${String(h%12||12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${h>=12?'pm':'am'}`;
}
function parseDate(d){
  if(!d)return'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(d)))return String(d);
  try{const dt=new Date(d);if(!isNaN(dt))return dt.toISOString().split('T')[0];}catch(e){}
  return String(d);
}
function fmtDate(d){
  const s=parseDate(d);
  if(!s)return'';
  const p=s.split('-');
  return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s;
}
function today(){return new Date().toISOString().split('T')[0];}

function thanaStr(sv,sj){
  const a=+sv||0,b=+sj||0;
  if(a&&b)return`${a} Sadhviji Bhagvant + ${b} Sadhu Bhagvant M.Sa.`;
  if(a)return`${a} Sadhviji Bhagvant M.Sa.`;
  if(b)return`${b} Sadhu Bhagvant M.Sa.`;
  return'';
}

function makeMsg(e){
  const wLines =(e.sevak        ||[]).filter(Boolean).map(w=>`🚶${w}`).join('\n');
  const vLines =(e.vehicleSevak ||[]).filter(Boolean).map(v=>`🛵 ${v}`).join('\n');
  const wiLines=(e.sevika       ||[]).filter(Boolean).map(w=>`🚶‍♀️${w}`).join('\n');
  const viLines=(e.vehicleSevika||[]).filter(Boolean).map(v=>`🛵 ${v}`).join('\n');
  const sevakBlk =[wLines,vLines].filter(Boolean).join('\n');
  const sevikaBlk=[wiLines,viLines].filter(Boolean).join('\n');
  let msg=`🚶🏻‍♂️*VSG GANDHINAGAR*🚶🏻\n*🔢 VIHAR NO.-* ${e.viharNo}\n \n📅 *DATE:* ${fmtDate(e.date)}\n⏰ *TIME:* ${fmt12(e.timeFrom)} to ${fmt12(e.timeTo)}\n \n🙏🏻 *THANA:* ${thanaStr(e.thanaSadhavijee,e.thanaSadhujee)}\n🛣 *K.M.:* ${e.km} K.M.\n \n*🏫 VIHAR DHAM*\n🛕 *From :* ${e.fromDerasar}\n🛕 *To :*  ${e.toDerasar}`;
  if(sevakBlk) msg+=`\n \n*🙋 VIHAR SEVAK*\n${sevakBlk}`;
  if(sevikaBlk)msg+=`\n \n*🙋‍♀️ VIHAR SEVIKA*\n${sevikaBlk}`;
  msg+=`\n \n*🌸 विहार सेवा🙏🏻अनमोल सेवा*`;
  return msg;
}

function blankForm(lastNo=0){
  return{viharNo:lastNo+1,date:today(),timeFrom:'04:45',timeTo:'07:45',
    thanaSadhavijee:'',thanaSadhujee:'',km:'',fromDerasar:'',toDerasar:''};
}

// ── Google Sheets sync ────────────────────────────────────────
async function apiCall(url,action,payload){
  if(!url)return null;
  try{
    let u=`${url}?action=${action}`;
    if(action==='save')   u+=`&data=${encodeURIComponent(JSON.stringify(payload))}`;
    if(action==='delete') u+=`&id=${payload}`;
    if(action==='newYear')u+=`&year=${payload}`;
    const r=await fetch(u,{redirect:'follow'});
    return await r.json();
  }catch(e){return null;}
}

// ── AutoInput — portal-based dropdown, opens up/down smartly ──
function AutoInput({value,onChange,suggestions,placeholder,style}){
  const[open,setOpen]=useState(false);
  const[filtered,setFiltered]=useState([]);
  const[rect,setRect]=useState(null);
  const ref=useRef(null);

  useEffect(()=>{
    if(value&&value.length>0&&suggestions&&suggestions.length>0){
      setFiltered(suggestions.filter(s=>s.toLowerCase().includes(value.toLowerCase())).slice(0,8));
    }else{
      setFiltered([]);
    }
  },[value,suggestions]);

  function measureAndOpen(){
    if(ref.current){
      setRect(ref.current.getBoundingClientRect());
    }
    setOpen(true);
  }

  // Dropdown rendered into document.body via portal — escapes all overflow:hidden parents
  const dropdown = open&&filtered.length>0&&rect ? ReactDOM.createPortal(
    (()=>{
      const spaceBelow=window.innerHeight-rect.bottom-8;
      const spaceAbove=rect.top-8;
      const maxH=Math.min(200, spaceBelow>120?spaceBelow:spaceAbove);
      const openUp=spaceBelow<130&&spaceAbove>spaceBelow;
      return(
        <div style={{
          position:'fixed',
          left:rect.left,
          width:rect.width,
          ...(openUp
            ?{bottom:window.innerHeight-rect.top+2}
            :{top:rect.bottom+2}),
          background:'#fff',
          border:`1.5px solid ${C.border}`,
          borderRadius:9,
          zIndex:9999,
          boxShadow:'0 6px 24px #00000028',
          maxHeight:maxH,
          overflowY:'auto',
        }}>
          {filtered.map(s=>(
            <div key={s} className="sug-item"
              onMouseDown={e=>{e.preventDefault();onChange(s);setOpen(false);}}
              style={{padding:'11px 14px',fontSize:14,color:C.dark,
                borderBottom:`1px solid ${C.bl}`,cursor:'pointer',lineHeight:1.3}}>
              {s}
            </div>
          ))}
        </div>
      );
    })(),
    document.body
  ) : null;

  return(
    <div style={{position:'relative',...style}}>
      <input
        ref={ref}
        style={{...S.inp,width:'100%'}}
        type="text"
        value={value}
        placeholder={placeholder}
        onChange={ev=>{onChange(ev.target.value);measureAndOpen();}}
        onFocus={measureAndOpen}
        onBlur={()=>setTimeout(()=>setOpen(false),200)}
      />
      {dropdown}
    </div>
  );
}

// ── ListInput — OUTSIDE App ───────────────────────────────────
function ListInput({items,setItems,label,icon,accentColor,suggestions}){
  const ac=accentColor||C.primary;
  return(
    <div style={{marginTop:12}}>
      <label style={S.lbl}>{icon} {label}</label>
      {items.map((v,i)=>(
        <div key={i} style={{display:'flex',gap:6,marginBottom:7}}>
          <AutoInput
            value={v}
            onChange={val=>setItems(a=>a.map((x,j)=>j===i?val:x))}
            suggestions={suggestions}
            placeholder={label}
            style={{flex:1}}
          />
          {items.length>1&&(
            <button style={{...S.btn,...S.bDel,padding:'9px 12px',minWidth:38,flexShrink:0}}
              onClick={()=>setItems(a=>a.filter((_,j)=>j!==i))}>✕</button>
          )}
        </div>
      ))}
      <button style={{display:'flex',alignItems:'center',justifyContent:'center',
        width:'100%',padding:'8px',fontSize:13,background:'transparent',
        color:ac,border:`1.5px solid ${ac}`,borderRadius:10,cursor:'pointer',fontWeight:700}}
        onClick={()=>setItems(a=>[...a,''])}>
        + Add {label}
      </button>
    </div>
  );
}

function Medal({rank}){
  const bg=rank===0?'#FFD700':rank===1?'#C0C0C0':rank===2?'#CD7F32':C.border;
  return(
    <div style={{width:28,height:28,borderRadius:'50%',background:bg,display:'flex',
      alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,
      color:rank<3?'#5C3D00':C.dark,flexShrink:0}}>{rank+1}</div>
  );
}

// ── Main App ─────────────────────────────────────────────────
function App(){
  const[tab,setTab]             =useState('new');
  const[entries,setEntries]     =useState([]);
  const[form,setForm]           =useState(blankForm(0));
  const[sevak,setSevak]         =useState(['']);
  const[vehicleSevak,setVehSevak]=useState(['']);
  const[sevika,setSevika]       =useState(['']);
  const[vehicleSevika,setVehSevika]=useState(['']);
  const[preview,setPreview]     =useState(false);
  const[copied,setCopied]       =useState(null);
  const[editId,setEditId]       =useState(null);
  const[loading,setLoading]     =useState(true);
  const[syncing,setSyncing]     =useState(false);
  const[toast,setToast]         =useState(null);
  const[expanded,setExpanded]   =useState(null);
  const[delConfirm,setDelConfirm]=useState(null);
  const[showSetup,setShowSetup] =useState(false);
  const[scriptUrl,setScriptUrl] =useState('');
  const[scriptInput,setScriptInput]=useState('');
  const[yearConfirm,setYearConfirm]=useState(false);
  // Master data for autocomplete
  const[places,setPlaces]       =useState([]);
  const[sevakNames,setSevakNames]=useState([]);
  const[sevikaNames,setSevikaNames]=useState([]);

  useEffect(()=>{init();},[]);

  async function init(){
    const url=localStorage.getItem(LS_SCRIPT)||'';    setScriptUrl(url);setScriptInput(url);
    const local=JSON.parse(localStorage.getItem(LS_ENTRIES)||'[]');

    // Load cached config
    try{
      const cfg=JSON.parse(localStorage.getItem(LS_CONFIG)||'null');
      if(cfg){setPlaces(cfg.places||[]);setSevakNames(cfg.sevakNames||[]);setSevikaNames(cfg.sevikaNames||[]);}
    }catch(e){}

    if(url){
      setSyncing(true);
      const[remote,config]=await Promise.all([
        apiCall(url,'getAll'),
        apiCall(url,'getConfig'),
      ]);
      setSyncing(false);

      if(config&&config.success){
        const cfg={places:config.places||[],sevakNames:config.sevakNames||[],sevikaNames:config.sevikaNames||[]};
        setPlaces(cfg.places);setSevakNames(cfg.sevakNames);setSevikaNames(cfg.sevikaNames);
        localStorage.setItem(LS_CONFIG,JSON.stringify(cfg));
      }
      if(remote&&remote.success&&remote.entries.length>0){
        const merged=merge(local,remote.entries);
        apply(merged);setLoading(false);return;
      }
    }
    apply(local);setLoading(false);
  }

  function merge(a,b){
    const m={};[...a,...b].forEach(e=>{m[e.id]=e;});
    return Object.values(m).sort((x,y)=>+y.viharNo-+x.viharNo);
  }
  function apply(data){
    const mx=data.length?Math.max(...data.map(e=>+e.viharNo||0)):0;
    setEntries(data);setForm(f=>({...f,viharNo:mx+1}));
  }
  function save(data){
    localStorage.setItem(LS_ENTRIES,JSON.stringify(data));apply(data);
  }

  function toast_(msg,type='ok'){setToast({msg,type});setTimeout(()=>setToast(null),2600);}
  const fc=(f,v)=>setForm(x=>({...x,[f]:v}));

  async function submit(){
    const sv=+form.thanaSadhavijee||0,sj=+form.thanaSadhujee||0;
    if(!form.date||!form.timeFrom||!form.timeTo||(sv===0&&sj===0)||!form.km||!form.fromDerasar||!form.toDerasar){
      toast_('Please fill all required fields ⚠️','err');return;
    }
    if(![...sevak,...vehicleSevak,...sevika,...vehicleSevika].filter(Boolean).length){
      toast_('Add at least one Sevak or Sevika name','err');return;
    }
    const entry={
      id:editId||Date.now()+'',
      ...form,viharNo:+form.viharNo,km:+form.km,
      thanaSadhavijee:sv,thanaSadhujee:sj,
      sevak:sevak.filter(Boolean),
      vehicleSevak:vehicleSevak.filter(Boolean),
      sevika:sevika.filter(Boolean),
      vehicleSevika:vehicleSevika.filter(Boolean),
      savedAt:new Date().toISOString(),
    };
    let nd=editId?entries.map(e=>e.id===editId?entry:e):[entry,...entries];
    nd.sort((a,b)=>+b.viharNo-+a.viharNo);
    save(nd);apiCall(scriptUrl,'save',entry);
    toast_(editId?'Entry updated! ✓':'Vihar saved! 🙏🏻');
    reset(nd);setTab('entries');
  }

  function reset(nd=[]){
    const mx=nd.length?Math.max(...nd.map(e=>+e.viharNo)):0;
    setForm(blankForm(mx));
    setSevak(['']);setVehSevak(['']);setSevika(['']);setVehSevika(['']);
    setEditId(null);setPreview(false);
  }

  function startEdit(e){
    setForm({viharNo:e.viharNo,date:e.date,timeFrom:e.timeFrom,timeTo:e.timeTo,
      thanaSadhavijee:e.thanaSadhavijee||'',thanaSadhujee:e.thanaSadhujee||'',
      km:e.km,fromDerasar:e.fromDerasar,toDerasar:e.toDerasar});
    setSevak(e.sevak?.length?[...e.sevak]:['']);
    setVehSevak(e.vehicleSevak?.length?[...e.vehicleSevak]:['']);
    setSevika(e.sevika?.length?[...e.sevika]:['']);
    setVehSevika(e.vehicleSevika?.length?[...e.vehicleSevika]:['']);
    setEditId(e.id);setPreview(false);setTab('new');setExpanded(null);
  }

  async function doDelete(id){
    const nd=entries.filter(e=>e.id!==id);
    save(nd);apiCall(scriptUrl,'delete',id);
    setDelConfirm(null);setExpanded(null);toast_('Entry deleted');
  }

  function copyMsg(entry){
    const msg=makeMsg(entry);
    const done=()=>{setCopied(entry.id||'prev');toast_('Copied! Paste in WhatsApp 📋');setTimeout(()=>setCopied(null),2000);};
    if(navigator.clipboard)navigator.clipboard.writeText(msg).then(done).catch(()=>fb(msg,done));
    else fb(msg,done);
  }
  function fb(t,cb){const el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);cb();}

  function saveScript(){
    const u=scriptInput.trim();
    localStorage.setItem(LS_SCRIPT,u);
    setScriptUrl(u);setShowSetup(false);
    toast_('Settings saved! Syncing…');
    setTimeout(()=>init(),300);
  }

  async function doNewYear(){
    const yr=new Date().getFullYear();
    await apiCall(scriptUrl,'newYear',yr);
    localStorage.removeItem(LS_ENTRIES);
    save([]);setYearConfirm(false);setShowSetup(false);
    toast_('New year started! Vihar No. reset to 1 🙏🏻');
  }

  // Reports — all current entries = This Year
  const totalKm =entries.reduce((s,e)=>s+(+e.km||0),0);
  const totalSv =entries.reduce((s,e)=>s+(+e.thanaSadhavijee||0),0);
  const totalSj =entries.reduce((s,e)=>s+(+e.thanaSadhujee||0),0);

  const sevakCnt={};
  entries.forEach(e=>[...(e.sevak||[]),(e.walkers||[]),...(e.vehicleSevak||[])].flat().forEach(s=>{if(s)sevakCnt[s]=(sevakCnt[s]||0)+1;}));
  const topSevaks=Object.entries(sevakCnt).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const sevikaCnt={};
  entries.forEach(e=>[...(e.sevika||[]),...(e.vehicleSevika||[])].forEach(s=>{if(s)sevikaCnt[s]=(sevikaCnt[s]||0)+1;}));
  const topSevikas=Object.entries(sevikaCnt).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const prev={...form,sevak,vehicleSevak,sevika,vehicleSevika,id:'prev'};

  if(loading)return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:C.bg}}>
      <div style={{textAlign:'center'}}>
        <img src={IMG_LOGO} style={{width:100,height:100,borderRadius:12,marginBottom:12,objectFit:'cover'}} alt="VSG"/>
        <div style={{color:C.primary,fontWeight:900,fontSize:18}}>VSG Vihar Seva</div>
        <div style={{color:C.muted,fontSize:13,marginTop:6}}>{syncing?'Syncing with Google Sheets…':'Loading…'}</div>
      </div>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',maxWidth:480,margin:'0 auto',position:'relative'}}>

      {/* Toast */}
      {toast&&(
        <div style={{position:'fixed',top:66,left:'50%',transform:'translateX(-50%)',
          background:toast.type==='err'?C.red:C.green,color:'#fff',padding:'10px 22px',
          borderRadius:30,zIndex:999,fontWeight:700,fontSize:13,
          boxShadow:'0 4px 20px #00000040',whiteSpace:'nowrap',maxWidth:'90%',textAlign:'center'}}>
          {toast.msg}
        </div>
      )}

      {/* New Year Confirm */}
      {yearConfirm&&(
        <div style={{position:'fixed',inset:0,background:'#00000070',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'#fff',borderRadius:18,padding:24,width:'100%',maxWidth:340,boxShadow:'0 8px 32px #00000030'}}>
            <div style={{fontSize:36,textAlign:'center',marginBottom:10}}>🎊</div>
            <div style={{fontSize:16,fontWeight:900,color:C.dark,textAlign:'center',marginBottom:8}}>Start New Year?</div>
            <div style={{fontSize:13,color:C.muted,textAlign:'center',lineHeight:1.7,marginBottom:8}}>
              This will:<br/>
              • Archive current data to a new sheet tab<br/>
              • Reset Vihar No. back to 1<br/>
              • Clear the list on all devices
            </div>
            <div style={{background:'#FFF3E0',border:'1px solid #FFCC80',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#E65100',marginBottom:20,textAlign:'center'}}>
              ⚠️ Do this only once at start of new year
            </div>
            <div style={{display:'flex',gap:10}}>
              <button style={{...S.btn,...S.bGh,flex:1}} onClick={()=>setYearConfirm(false)}>Cancel</button>
              <button style={{...S.btn,...S.bDanger,flex:2}} onClick={doNewYear}>Yes, Start New Year</button>
            </div>
          </div>
        </div>
      )}

      {/* Setup Modal */}
      {showSetup&&!yearConfirm&&(
        <div style={{position:'fixed',inset:0,background:'#00000070',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
          <div style={{background:'#fff',borderRadius:'20px 20px 0 0',padding:24,width:'100%',maxWidth:480,boxShadow:'0 -8px 32px #00000030',maxHeight:'90vh',overflowY:'auto'}}>
            <div style={{fontSize:18,fontWeight:900,color:C.dark,marginBottom:12}}>⚙️ Settings</div>
            <label style={S.lbl}>Google Apps Script URL</label>
            <input style={{...S.inp,marginBottom:10}} type="text" value={scriptInput}
              onChange={e=>setScriptInput(e.target.value)}
              placeholder="https://script.google.com/macros/s/…/exec"/>
            <button style={{...S.btn,...S.bP,width:'100%'}} onClick={saveScript}>Save & Sync</button>
            {!scriptUrl&&(
              <div style={{marginTop:12,background:'#FFF8EC',border:`1px solid ${C.border}`,borderRadius:10,padding:12,fontSize:12,color:C.muted,lineHeight:1.8}}>
                <b>How to connect Google Sheets:</b><br/>
                1. Open your Google Sheet → Extensions → Apps Script<br/>
                2. Paste Code.gs content → Save<br/>
                3. Deploy → New Deployment → Web App → Who has access: <b>Anyone</b><br/>
                4. Authorize → Copy URL and paste above
              </div>
            )}
            {scriptUrl&&(
              <div style={{marginTop:12,background:'#F0FFF4',border:'1px solid #A8E6C0',borderRadius:10,padding:'8px 12px',fontSize:12,color:C.green,fontWeight:700}}>
                ✓ Connected to Google Sheets
                <div style={{fontWeight:400,color:C.muted,marginTop:2}}>

                </div>
              </div>
            )}
            <div style={{marginTop:18,borderTop:`1px solid ${C.bl}`,paddingTop:16}}>
              <div style={{fontSize:13,fontWeight:800,color:C.dark,marginBottom:4}}>🎊 New Year Reset</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.7}}>

              <button style={{...S.btn,width:'100%',background:'#FFF3E0',color:'#E65100',border:'1px solid #FFCC80',fontWeight:700,borderRadius:10,cursor:'pointer'}}

              </button>
            </div>
            <button style={{...S.btn,...S.bGh,width:'100%',marginTop:14}} onClick={()=>setShowSetup(false)}>Close</button>
          </div>
        </div>
      )}

      {/* Delete Confirm */}
      {delConfirm&&(
        <div style={{position:'fixed',inset:0,background:'#00000060',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'#fff',borderRadius:18,padding:24,width:'100%',maxWidth:340,boxShadow:'0 8px 32px #00000030'}}>
            <div style={{fontSize:32,textAlign:'center',marginBottom:10}}>🗑️</div>
            <div style={{fontSize:16,fontWeight:800,color:C.dark,marginBottom:5,textAlign:'center'}}>Delete Vihar #{delConfirm.viharNo}?</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20,textAlign:'center'}}>{fmtDate(delConfirm.date)} • {delConfirm.fromDerasar} → {delConfirm.toDerasar}</div>
            <div style={{display:'flex',gap:10}}>
              <button style={{...S.btn,...S.bGh,flex:1}} onClick={()=>setDelConfirm(null)}>Cancel</button>
              <button style={{...S.btn,...S.bDanger,flex:1}} onClick={()=>doDelete(delConfirm.id)}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={S.hdr}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <img src={IMG_LOGO} style={{width:40,height:40,borderRadius:8,objectFit:'cover',flexShrink:0,border:'2px solid #ffffff40'}} alt="VSG"/>
            <div>
              <div style={{fontSize:14,fontWeight:900,letterSpacing:0.3}}>VSG GANDHINAGAR</div>
              <div style={{fontSize:10,opacity:0.85,marginTop:1}}>
                विहार सेवा&nbsp;•&nbsp;{entries.length} Entries
                {syncing&&<span style={{marginLeft:6,fontSize:9}}>⟳ Syncing…</span>}
              </div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {tab==='new'&&(
              <div style={{background:'#ffffff22',borderRadius:8,padding:'5px 10px',border:'1px solid #ffffff40',textAlign:'center'}}>
                <div style={{fontSize:9,opacity:0.8,fontWeight:600}}>{editId?'EDITING':'AUTO NO.'}</div>
                <div style={{fontSize:18,fontWeight:900}}>#{form.viharNo}</div>
              </div>
            )}
            <button style={{background:'#ffffff22',border:'1px solid #ffffff40',borderRadius:8,padding:'7px 10px',color:'#fff',cursor:'pointer',fontSize:16}}
              onClick={()=>setShowSetup(true)}>⚙️</button>

      </div>

                <div style={S.r2}>
                  <div>
                    <label style={S.lbl}>Date *</label>
                    <input style={S.inp} type="date" value={form.date} onChange={e=>fc('date',e.target.value)}/>

                    <label style={S.lbl}>Vihar No.</label>

                    </div>

                  <div>

                <div style={{fontSize:52}}>🙏🏻</div>
                <div style={{fontWeight:800,marginTop:10,fontSize:15,color:C.dark}}>No entries yet</div>
                <div style={{fontSize:13,marginTop:5}}>Tap "New Entry" to begin</div>
              </div>
            ):entries.map(e=>(
              <div key={e.id} style={S.card}>
                <div style={{padding:'11px 14px',display:'flex',alignItems:'flex-start',justifyContent:'space-between',cursor:'pointer',gap:8}}
                  onClick={()=>setExpanded(expanded===e.id?null:e.id)}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
                      <span style={{fontWeight:900,color:C.primary,fontSize:16}}>Vihar #{e.viharNo}</span>
                      <span style={{fontSize:10,background:'#FFF0DC',color:C.primary,padding:'2px 7px',borderRadius:20,fontWeight:700}}>{thanaStr(e.thanaSadhavijee,e.thanaSadhujee)}</span>
                    </div>
                    <div style={{fontSize:12,color:C.muted,marginBottom:2}}>📅 {fmtDate(e.date)}&nbsp;&nbsp;⏰ {fmt12(e.timeFrom)}–{fmt12(e.timeTo)}</div>
                    <div style={{fontSize:12,color:'#555'}}>🛕 {e.fromDerasar} → {e.toDerasar}</div>
                    <div style={{fontSize:12,color:'#555',marginTop:2}}>🛣 {e.km} km</div>
                  </div>
                  <div style={{color:C.muted,fontSize:14,paddingTop:2}}>{expanded===e.id?'▲':'▼'}</div>
                </div>
                {expanded===e.id&&(
                  <div style={{borderTop:`1px solid ${C.bl}`}}>
                    <div style={{padding:'10px 14px 4px',fontSize:13,color:'#444',lineHeight:1.9}}>
                      {[...(e.sevak||[]),(e.walkers||[])].flat().concat(e.vehicleSevak||[]).filter(Boolean).length>0&&(
                        <div style={{marginBottom:6}}>
                          <div style={{fontWeight:700,color:C.muted,fontSize:10,marginBottom:2,textTransform:'uppercase',letterSpacing:0.5}}>Vihar Sevak</div>
                          {[...(e.sevak||[]),(e.walkers||[])].flat().filter(Boolean).map((w,i)=><div key={i}>🚶 {w}</div>)}
                          {(e.vehicleSevak||[]).filter(Boolean).map((v,i)=><div key={i}>🛵 {v}</div>)}
                        </div>
                      )}
                      {[...(e.sevika||[]),...(e.vehicleSevika||[])].filter(Boolean).length>0&&(
                        <div>
                          <div style={{fontWeight:700,color:'#7B2D8B',fontSize:10,marginBottom:2,textTransform:'uppercase',letterSpacing:0.5}}>Vihar Sevika</div>
                          {(e.sevika||[]).filter(Boolean).map((w,i)=><div key={i} style={{color:'#7B2D8B'}}>🚶‍♀️ {w}</div>)}
                          {(e.vehicleSevika||[]).filter(Boolean).map((v,i)=><div key={i} style={{color:'#7B2D8B'}}>🛵 {v}</div>)}
                        </div>
                      )}
                    </div>
                    <div style={{padding:'8px 14px 12px',display:'flex',gap:6}}>
                      <button className="tap" style={{...S.btn,...S.bWa,flex:3,fontSize:12,padding:'9px 8px'}} onClick={()=>copyMsg(e)}>
                        {copied===e.id?'✓ Copied!':'📋 Copy for WhatsApp'}
                      </button>
                      <button className="tap" style={{...S.btn,...S.bOut,flex:1,fontSize:12,padding:'9px 6px'}} onClick={()=>startEdit(e)}>✏️</button>
                      <button className="tap" style={{...S.btn,...S.bDel,flex:1,fontSize:12,padding:'9px 6px'}} onClick={()=>setDelConfirm(e)}>🗑️</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* ══ REPORTS ══ */}
        {tab==='reports'&&(
          <div className="su">
            {/* This Year header */}
            <div style={{background:`linear-gradient(135deg,${C.h1},${C.h2})`,borderRadius:14,padding:'14px 16px',marginBottom:12,color:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:11,opacity:0.8,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5}}>Current Year</div>
                <div style={{fontSize:20,fontWeight:900,marginTop:2}}>This Year's Summary</div>
              </div>
              <div style={{fontSize:36}}>📊</div>
            </div>

            {/* Summary tiles */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
              {[
                {icon:'🔢',label:'Total Vihar',val:entries.length},
                {icon:'🛣',label:'Total KM',val:totalKm%1===0?totalKm:totalKm.toFixed(1)},
                {icon:'🧘‍♀️',label:'Sadhviji Bhagvant',val:totalSv},
                {icon:'🧘',label:'Sadhu Bhagvant',val:totalSj},
              ].map(item=>(
                <div key={item.label} style={{background:'#FFF8EC',border:`1.5px solid ${C.border}`,borderRadius:14,padding:'12px 8px',textAlign:'center',minWidth:0,overflow:'hidden'}}>
                  <div style={{fontSize:22}}>{item.icon}</div>
                  <div style={{fontSize:24,fontWeight:900,color:C.primary,marginTop:4,lineHeight:1}}>{item.val}</div>
                  <div style={{fontSize:9,color:C.muted,fontWeight:700,marginTop:4,textTransform:'uppercase',letterSpacing:0.2,wordBreak:'break-word',lineHeight:1.3}}>{item.label}</div>
                </div>
              ))}
            </div>

            {/* Top Sevak */}
            {topSevaks.length>0&&(
              <div style={S.card}>
                <div style={S.cHead}>🏆 Top Sevak</div>
                <div style={{padding:'8px 14px 12px'}}>
                  {topSevaks.map(([name,count],i)=>(
                    <div key={name} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<topSevaks.length-1?`1px solid ${C.bl}`:'none'}}>
                      <Medal rank={i}/>
                      <div style={{flex:1,fontWeight:700,color:C.dark,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}>{name}</div>
                      <div style={{fontWeight:900,color:C.primary,fontSize:15}}>{count}<span style={{fontSize:11,fontWeight:600,color:C.muted}}>x</span></div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Top Sevika */}
            {topSevikas.length>0&&(
              <div style={{...S.card,border:'1px solid #D9B3EC'}}>
                <div style={S.cHeadF}>🏆 Top Sevika</div>
                <div style={{padding:'8px 14px 12px'}}>
                  {topSevikas.map(([name,count],i)=>(
                    <div key={name} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<topSevikas.length-1?'1px solid #E8D0F5':'none'}}>
                      <Medal rank={i}/>
                      <div style={{flex:1,fontWeight:700,color:C.dark,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}>{name}</div>
                      <div style={{fontWeight:900,color:'#7B2D8B',fontSize:15}}>{count}<span style={{fontSize:11,fontWeight:600,color:C.muted}}>x</span></div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {entries.length===0&&(
              <div style={{textAlign:'center',padding:'50px 20px',color:C.muted}}>
                <div style={{fontSize:48}}>📊</div>
                <div style={{fontWeight:800,marginTop:10,fontSize:15,color:C.dark}}>No data yet</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Bottom Nav — FIXED */}
      <div style={S.nav}>
        {[
          {id:'new',  icon:'📝',label:editId?'Edit Entry':'New Entry'},
          {id:'entries',icon:'📋',label:`Entries${entries.length?` (${entries.length})`:''}`},
          {id:'reports',icon:'📊',label:'Reports'},
        ].map(({id,icon,label})=>(
          <button key={id} style={{...S.nBtn,color:tab===id?C.primary:'#AAA',
            borderTop:`2.5px solid ${tab===id?C.primary:'transparent'}`}}
            onClick={()=>setTab(id)}>
            <span style={{fontSize:20}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:700}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
